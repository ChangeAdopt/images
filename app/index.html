<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Signature Generator</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #5b32ff; --purple-dark: #4a28d4;
      --text: #323130; --muted: #605e5c; --hint: #a19f9d;
      --border: #e0e0e0; --white: #ffffff; --radius: 8px;
    }
    body {
      font-family: "Segoe UI", -apple-system, sans-serif;
      font-size: 14px; color: var(--text); background: var(--white);
      padding: 32px 28px; max-width: 580px; margin: 0 auto;
    }
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 220px; gap: 14px; color: var(--muted);
    }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--purple); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-box {
      display: none; background: #fdf3f3; border: 1px solid #f4b8b8;
      border-radius: var(--radius); padding: 16px; color: #a4262c; line-height: 1.6;
    }
    #app { display: none; }
    .phone-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
    }
    .phone-row label { font-size: 13px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .phone-row input {
      flex: 1; padding: 6px 10px; font-size: 14px; font-family: inherit;
      border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none;
    }
    .phone-row input:focus { border-color: var(--purple); }
    .sig-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; background: var(--white); margin-bottom: 16px;
    }
    .copy-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 11px; background: var(--purple); color: #fff;
      border: none; border-radius: var(--radius); font-size: 15px;
      font-family: inherit; font-weight: 500; cursor: pointer;
      transition: background 0.15s; margin-bottom: 12px;
    }
    .copy-btn:hover { background: var(--purple-dark); }
    .copy-btn.success { background: #107c41; }
    .hint { font-size: 12px; color: var(--hint); text-align: center; line-height: 1.7; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><span>Loading your profile…</span></div>
  <div id="error-box"></div>
  <div id="app">
    <div class="phone-row">
      <label>Phone</label>
      <input type="tel" id="f-phone" placeholder="+44 1234 567890" oninput="renderSig()" />
    </div>
    <div class="sig-card" id="sig-preview"></div>
    <button class="copy-btn" id="copy-btn" onclick="copySig()">Copy signature</button>
    <p class="hint">
      In Outlook: New Email → Signature → Signatures…<br>
      Create a new signature, click inside the text area, then paste (Ctrl+V).
    </p>
  </div>

  <script>
    const CLIENT_ID = 'd74adcb0-f57c-40b7-a7c3-582ea2120053';
    const TENANT_ID = 'common';
    const LOGO_URL = 'https://raw.githubusercontent.com/ChangeAdopt/images/refs/heads/main/CA.png';
    const BRAND_COLOR = '#5b32ff';
    const COMPANY_NAME = 'Change Adopt';

    let profile = null;

    microsoftTeams.app.initialize().then(async () => {
      try {
        const token = await microsoftTeams.authentication.getAuthToken();
        await loadProfile(token);
      } catch {
        try { await loadProfile(await msalLogin()); }
        catch (e) { showError(e.message); }
      }
    });

    async function msalLogin() {
      const inst = new msal.PublicClientApplication({
        auth: { clientId: CLIENT_ID, authority: `https://login.microsoftonline.com/${TENANT_ID}`, redirectUri: window.location.href }
      });
      await inst.initialize();
      return (await inst.loginPopup({ scopes: ['User.Read'] })).accessToken;
    }

    async function loadProfile(token) {
      const res = await fetch(
        'https://graph.microsoft.com/v1.0/me?$select=displayName,jobTitle,mail,department,businessPhones,mobilePhone',
        { headers: { Authorization: 'Bearer ' + token } }
      );
      if (!res.ok) throw new Error('Graph API error ' + res.status);
      const d = await res.json();
      profile = {
        name: d.displayName || '',
        title: d.jobTitle || '',
        email: d.mail || '',
        phone: d.businessPhones?.[0] || d.mobilePhone || ''
      };
      document.getElementById('f-phone').value = profile.phone;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      renderSig();
    }

    function buildSigHtml() {
      if (!profile) return '';
      const phone = document.getElementById('f-phone').value;

      const phoneRow = phone
        ? `<div style="font-size:13px;line-height:2;color:#333;font-family:system-ui,sans-serif;">${phone}</div>`
        : '';
      const emailRow = profile.email
        ? `<div style="font-size:13px;line-height:2;font-family:system-ui,sans-serif;"><a href="mailto:${profile.email}" style="color:${BRAND_COLOR};text-decoration:none;">${profile.email}</a></div>`
        : '';

      return `<div style="font-family:system-ui,sans-serif;color:#000;">
  <div style="margin-bottom:16px;line-height:1.6;">Regards,<br /><br /></div>
  <table cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
    <tbody>
      <tr>
        <td style="padding-right:20px;vertical-align:top;">
          <img alt="${COMPANY_NAME} logo" src="${LOGO_URL}"
            style="width:120px;height:80px;border-radius:8px;object-fit:contain;" />
        </td>
        <td style="vertical-align:top;">
          <div style="font-size:20px;font-weight:bold;color:${BRAND_COLOR};margin-bottom:4px;">${profile.name}</div>
          <div style="font-size:14px;color:#666;margin-bottom:2px;">${profile.title}</div>
          <div style="font-size:14px;color:${BRAND_COLOR};font-weight:600;margin-bottom:12px;">${COMPANY_NAME}</div>
          <div style="font-size:13px;line-height:2;">
            ${emailRow}
            ${phoneRow}
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>`;
    }

    function renderSig() {
      document.getElementById('sig-preview').innerHTML = buildSigHtml();
    }

    function copySig() {
      const el = document.getElementById('sig-preview');
      const btn = document.getElementById('copy-btn');
      const html = el.innerHTML;
      if (window.ClipboardItem) {
        navigator.clipboard.write([
          new ClipboardItem({
            'text/html': new Blob([html], { type: 'text/html' }),
            'text/plain': new Blob([el.innerText], { type: 'text/plain' })
          })
        ]).then(() => flash(btn)).catch(() => selectCopy(el, btn));
      } else {
        selectCopy(el, btn);
      }
    }

    function selectCopy(el, btn) {
      const range = document.createRange();
      range.selectNode(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand('copy');
      sel.removeAllRanges();
      flash(btn);
    }

    function flash(btn) {
      btn.textContent = '✓ Copied — paste into Outlook';
      btn.classList.add('success');
      setTimeout(() => { btn.textContent = 'Copy signature'; btn.classList.remove('success'); }, 3000);
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      const b = document.getElementById('error-box');
      b.innerHTML = '<strong>Error:</strong> ' + msg;
      b.style.display = 'block';
    }
  </script>
</body>
</html>
